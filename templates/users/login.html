{% extends 'base.html' %}

{% block title %}Login | Quizy+{% endblock %}

{% block content %}
<section class="auth-shell card-glass reveal">
    <h1>Sign In</h1>
    <p class="muted">Continue your quiz journey.</p>
    <form method="post" class="form-grid">
        {% csrf_token %}
        {{ form.non_field_errors }}
        <label>Username {{ form.username }} {{ form.username.errors }}</label>
        <label>Password {{ form.password }} {{ form.password.errors }}</label>
        <button class="btn btn-primary" type="submit">Login</button>
    </form>
    <p class="muted">New user? <a href="{% url 'users:register' %}">Create an account</a></p>
</section>
{% endblock %}
