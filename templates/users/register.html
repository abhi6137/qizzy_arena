{% extends 'base.html' %}

{% block title %}Register | Quizy+{% endblock %}

{% block content %}
<section class="auth-shell card-glass reveal">
    <h1>Create Your Account</h1>
    <p class="muted">Start attempting adaptive quizzes in minutes.</p>
    <form method="post" class="form-grid two-col">
        {% csrf_token %}
        {{ form.non_field_errors }}
        <label>Username {{ form.username }} {{ form.username.errors }}</label>
        <label>Email {{ form.email }} {{ form.email.errors }}</label>
        <label>First name {{ form.first_name }} {{ form.first_name.errors }}</label>
        <label>Last name {{ form.last_name }} {{ form.last_name.errors }}</label>
        <label>Password {{ form.password1 }} {{ form.password1.errors }}</label>
        <label>Confirm password {{ form.password2 }} {{ form.password2.errors }}</label>
        <button class="btn btn-primary" type="submit">Register</button>
    </form>
    <p class="muted">Already registered? <a href="{% url 'users:login' %}">Sign in</a></p>
</section>
{% endblock %}
