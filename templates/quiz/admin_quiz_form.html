{% extends 'base.html' %}

{% block title %}Quiz Form | Quizy+{% endblock %}

{% block content %}
<section class="section-head">
    <h1>{% if form.instance.pk %}Edit Quiz{% else %}Create Quiz{% endif %}</h1>
</section>

<section class="card-panel">
    <form method="post" class="form-grid two-col">
        {% csrf_token %}
        {{ form.non_field_errors }}
        <label>Title {{ form.title }}</label>
        <label>Slug {{ form.slug }}</label>
        <label class="full-width">Description {{ form.description }}</label>
        <label>Category {{ form.category }}</label>
        <label>Time Limit (minutes) {{ form.time_limit_minutes }}</label>
        <label>Passing (%) {{ form.passing_percentage }}</label>
        <label>Negative Marking (%) {{ form.negative_marking_percentage }}</label>
        <label>Start At {{ form.start_at }}</label>
        <label>End At {{ form.end_at }}</label>

        <label class="checkbox-field">{{ form.shuffle_questions }} Shuffle questions</label>
        <label class="checkbox-field">{{ form.allow_back_navigation }} Allow back navigation</label>
        <label class="checkbox-field">{{ form.allow_fullscreen }} Require fullscreen</label>
        <label class="checkbox-field">{{ form.is_adaptive }} Adaptive mode</label>
        <label class="checkbox-field">{{ form.is_published }} Publish quiz</label>
        <label class="checkbox-field">{{ form.is_daily_challenge }} Daily challenge</label>

        <div class="cta-row full-width">
            <button class="btn btn-primary" type="submit">Save Quiz</button>
            <a class="btn btn-ghost" href="{% url 'quiz:admin_quiz_list' %}">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
