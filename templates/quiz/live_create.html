{% extends 'base.html' %}

{% block title %}Create Live Session | Quizy+{% endblock %}

{% block content %}
<section class="section-head">
    <h1>Create Live Session</h1>
</section>

<section class="card-panel">
    <form method="post" class="form-grid">
        {% csrf_token %}
        {{ form.non_field_errors }}
        <label>Select Quiz {{ form.quiz }}</label>
        <label class="checkbox-field">{{ form.reveal_answers }} Reveal answers during session</label>
        <button class="btn btn-primary" type="submit">Create Session</button>
    </form>
</section>
{% endblock %}
