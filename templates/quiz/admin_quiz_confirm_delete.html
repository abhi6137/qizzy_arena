{% extends 'base.html' %}

{% block title %}Delete Quiz | Quizy+{% endblock %}

{% block content %}
<section class="card-panel">
    <h1>Delete Quiz</h1>
    <p>Are you sure you want to delete <strong>{{ object.title }}</strong>? This cannot be undone.</p>
    <form method="post" class="cta-row">
        {% csrf_token %}
        <button class="btn btn-danger" type="submit">Delete</button>
        <a class="btn btn-ghost" href="{% url 'quiz:admin_quiz_list' %}">Cancel</a>
    </form>
</section>
{% endblock %}
